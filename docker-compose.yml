services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app:/opt/api
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app
      - ./apps/api:/opt/api
      - vfxb_tmp:/tmp/vfxb
    command: python worker.py

  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  auth:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5000:5000"
    env_file:
      - back/server/.env
    volumes:
      - ./back/server:/app
      - auth_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  redis_data:
  vfxb_tmp:
  web_node_modules:
  auth_node_modules:
