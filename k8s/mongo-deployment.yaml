# MongoDB Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vfxb-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vfxb-mongo
  template:
    metadata:
      labels:
        app: vfxb-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      volumes:
      - name: mongo-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vfxb-mongo
spec:
  selector:
    app: vfxb-mongo
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
  type: ClusterIP
