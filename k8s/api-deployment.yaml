apiVersion: apps/v1
kind: Deployment
metadata:
  name: vfxb-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vfxb-api
  template:
    metadata:
      labels:
        app: vfxb-api
    spec:
      containers:
        - name: vfxb-api
          image: vfxb-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: vfxb-api
spec:
  type: NodePort
  selector:
    app: vfxb-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30080